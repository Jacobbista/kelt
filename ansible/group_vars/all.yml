ansible_user: vagrant
ansible_ssh_common_args: "-o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no"

# variabili "rete condivisa" tra Kubernetes e pod MEC (Multus)
mn_bridge: mn-br0
mn_subnet: 10.200.0.0/24
mn_gw: 10.200.0.1
# versioni / canali
k3s_channel: stable
k3s_version: v1.30.6+k3s1
kubeedge_version: 1.21.0
cloudcore_port: 10000
k3s_containerd_sock: unix:///run/k3s/containerd/containerd.sock

kubeconfig_path: /home/vagrant/kubeconfig

# Shared namespace for IAM stack (phase 08 Keycloak + PostgreSQL).
iam_namespace: iam

# IPs Nx centralizzati (statici)
# N1 AMF static IP (must be within n1-net NAD range)
amf_n1_ip: 10.201.0.100
# N2 AMF static IP (must be within n2-net NAD range)
amf_n2_ip: 10.202.0.100
# Per-cell N2/N3 IP components (AMF and gNB connect via per-cell overlay)
# N2: AMF={cell_n2_subnet_prefix}.{cell_id}.{amf_cell_n2_ip_suffix}
#     gNB={cell_n2_subnet_prefix}.{cell_id}.{gnb_cell_n2_ip_suffix}
# N3: gNB={cell_n3_subnet_prefix}.{cell_id}.{gnb_cell_n3_ip_suffix}
# Example cell 1: AMF N2=10.202.1.10, gNB N2=10.202.1.11, gNB N3=10.203.1.11
cell_n2_subnet_prefix: "10.202"
cell_n3_subnet_prefix: "10.203"
amf_cell_n2_ip_suffix: 10
gnb_cell_n2_ip_suffix: 11
gnb_cell_n3_ip_suffix: 11
# N3 UPF static IPs (must be within n3-net NAD range)
upf_cloud_n3_ip: 10.203.0.101
upf_edge_n3_ip: 10.203.0.102
# N4 SMF/UPF static IPs (must be within n4-net NAD range)
smf_n4_ip: 10.204.0.100
upf_cloud_n4_ip: 10.204.0.101
upf_edge_n4_ip: 10.204.0.102

# Component versions/images (centralized)
multus_version: 4.1.0
ovs_cni_version: 0.34.3
whereabouts_version: 0.7.0
cni_plugins_version: 1.5.1
alpine_image: alpine:3.20
overlay_mtu: 1450
# N6 cloud (br-n6c): decapsulated data plane; align with ogstun (1400) so TCP MSS matches GTP-U path.
# See docs/architecture/network-topology.md (MTU sizing and GTP-U encapsulation)
n6_data_mtu: 1400

# Interfacce e NAD (parametrizzabili)
# N1
nad_n1_namespace: 5g
nad_n1_name: n1-net
n1_interface_expected: n1
n1_interface_regex: ^(n1|net[0-9]+)$

# N2
nad_n2_namespace: 5g
nad_n2_name: n2-net
n2_interface_expected: n2
n2_interface_regex: ^(n2|net[0-9]+)$

# N3
nad_n3_namespace: 5g
nad_n3_name: n3-net
n3_interface_expected: n3
n3_interface_regex: ^(n3|net[0-9]+)$

# N4
nad_n4_namespace: 5g
nad_n4_name: n4-net
n4_interface_expected: n4
n4_interface_regex: ^(n4|net[0-9]+)$

# N6 Edge (MEC)
nad_n6e_namespace: mec
nad_n6e_name: n6-mec-net
n6e_interface_expected: n6
n6e_interface_regex: ^(n6|net[0-9]+)$

# N6 Cloud
nad_n6c_namespace: 5g
nad_n6c_name: n6c-net
n6c_interface_expected: n6
n6c_interface_regex: ^(n6|net[0-9]+)$

# Abilita test overlay (pod netshoot)
test_n1_enabled: false
test_n2_enabled: false
test_n3_enabled: false
test_n4_enabled: false
test_n6e_enabled: false
test_n6c_enabled: false

# Edge node toggle (set to true to deploy KubeEdge EdgeCore, edge OVS, edge Multus)
# Passed from Vagrantfile via -e edge_enabled=true/false
edge_enabled: false

# N6 MEC data network (for MEC services reachable by UEs via UPF)
n6m_subnet: "10.208.0.0/24"
n6m_gateway: "10.208.0.1"
n6m_vni: 108
nad_n6m_namespace: mec
nad_n6m_name: n6m-net
n6m_interface_expected: n6m
n6m_interface_regex: "^(n6m|net[0-9]+)$"

# VXLAN VNIs per 5G interface (overlay keys). Consumed by ovs-setup.sh via the
# OVS DaemonSet env. n6m_vni is defined in the N6 MEC block above.
n1_vni: 101
n2_vni: 102
n3_vni: 103
n4_vni: 104
n6e_vni: 106
n6c_vni: 107

# Optional addon toggles (off by default; opt-in). See docs/status.md for maturity.
# UERANSIM (simulated RAN, phase 6): set true to deploy gNB/UE. DEPLOY_MODE=full
# and `testbed run-phase 06-ueransim-mec` set this automatically.
ueransim_enabled: false
# Northbound positioning/CAMARA stack (phases 10-12 + placement-editor). Opt-in,
# off by default. `testbed northbound on` writes NORTHBOUND_ENABLED=true to
# .testbed.env, which turns the whole path on in one command; each sub-flag can
# still be overridden individually by its own env var. The env is visible both on
# `vagrant up` (exported by the Vagrantfile) and on `run-phase` (sources .testbed.env).
camara_enabled: "{{ (lookup('ansible.builtin.env', 'CAMARA_ENABLED') or lookup('ansible.builtin.env', 'NORTHBOUND_ENABLED') or 'false') | bool }}"
positioning_enabled: "{{ (lookup('ansible.builtin.env', 'POSITIONING_ENABLED') or lookup('ansible.builtin.env', 'NORTHBOUND_ENABLED') or 'false') | bool }}"
positioning_demo_enabled: "{{ (lookup('ansible.builtin.env', 'POSITIONING_DEMO_ENABLED') or lookup('ansible.builtin.env', 'NORTHBOUND_ENABLED') or 'false') | bool }}"
# placement-editor (room-geometry authoring UI) follows the positioning toggle.
placement_editor_enabled: "{{ (lookup('ansible.builtin.env', 'PLACEMENT_EDITOR_ENABLED') or lookup('ansible.builtin.env', 'NORTHBOUND_ENABLED') or 'false') | bool }}"

# ── External access (single base domain) ─────────────────────────────────────
# One operator-set base domain fronts every HTTP surface as <subdomain>.<base>,
# routed by the in-cluster front-door (phase 09) behind a single Cloudflare
# wildcard (*.<base>). Leave EXTERNAL_BASE_DOMAIN empty to fall back to per-service
# LAN NodePorts (no external exposure). Each service has a default subdomain below
# and an individual *_external_origin override (env) that still wins, for one-offs
# or staged migration. See docs/security/external-access.md.
external_base_domain: "{{ lookup('ansible.builtin.env', 'EXTERNAL_BASE_DOMAIN') | default('', true) }}"
external_scheme: "{{ lookup('ansible.builtin.env', 'EXTERNAL_SCHEME') | default('https', true) }}"
# Per-service subdomains (overridable). The front-door routing, the realm redirect
# URIs/web origins, and the dashboard public-link derivation all read these so the
# subdomain of a surface is defined in exactly one place.
dashboard_subdomain: "{{ lookup('ansible.builtin.env', 'DASHBOARD_SUBDOMAIN') | default('kelt', true) }}"
dashboard_dev_subdomain: "{{ lookup('ansible.builtin.env', 'DASHBOARD_DEV_SUBDOMAIN') | default('dev', true) }}"
camara_subdomain: "{{ lookup('ansible.builtin.env', 'CAMARA_SUBDOMAIN') | default('api', true) }}"
positioning_demo_subdomain: "{{ lookup('ansible.builtin.env', 'POSITIONING_DEMO_SUBDOMAIN') | default('demo', true) }}"
placement_editor_subdomain: "{{ lookup('ansible.builtin.env', 'PLACEMENT_EDITOR_SUBDOMAIN') | default('placement', true) }}"
# NodePort the in-cluster front-door (phase 09) listens on; the Cloudflare wildcard
# tunnel points *.<base> here. Front-door routes by Host to each service.
frontdoor_nodeport: 31500

# Physical RAN Integration (for femtocell/small cell connectivity)
# See docs/deployment/physical-ran.md for details
#
# physical_ran_enabled:  toggled at runtime via env var or extra-vars
# physical_ran_interface: worker VM NIC connected to the RAN network.
#   Leave empty for auto-detection: the OVS setup script finds the
#   interface whose IP falls within physical_ran_subnet.
# physical_ran_subnet: subnet of the physical RAN network
# amf_physical_ran_ip: IP for AMF on the RAN network (gNB connects here)
#
physical_ran_enabled: false
# Skip worker br-ran check before creating n2-physical / patching AMF (not recommended).
physical_ran_skip_bridge_check: false
physical_ran_interface: ""
physical_ran_subnet: "192.168.6.0/24"
# AMF's IP on the physical RAN network (gNB connects here)
amf_physical_ran_ip: "192.168.6.150"

# Bridge physical RAN to both N2 and N3 when using real gNB/UE.
# This enables NGAP (control plane) and GTP-U (user plane) end-to-end.
# Derived from physical_ran_enabled — override with extra-vars if needed.
ran_bridge_mode: "{{ 'n2_n3' if (physical_ran_enabled | default(false) | bool) else 'disabled' }}"
ran_interface: "{{ physical_ran_interface }}"

# Keep edge UPF disabled by default in current physical-RAN profile.
# Set true only when upf-edge replica is enabled and reachable on N4.
use_upf_edge: false

# Phase 6 topology variables moved to ansible/phases/06-ueransim-mec/vars/topology.yml

# ── 5G NF container images ───────────────────────────────────────────────────
mongodb_image: "docker.io/library/mongo:6"
# Used as initContainer for UPF/AMF network setup (ip, iptables, sysctl).
network_setup_image: "ghcr.io/nicolaka/netshoot:latest"
# Source: https://github.com/Jacobbista/5g-nf-platform
# Tag format: <upstream-open5gs-version>-p<patch-revision>
# p0 = no patches; p1+ = research patches applied (see repo for changelog)
nf_images:
  amf:  "ghcr.io/jacobbista/5g-nf-platform/amf:2.7.7-p0"
  smf:  "ghcr.io/jacobbista/5g-nf-platform/smf:2.7.7-p0"
  upf:  "ghcr.io/jacobbista/5g-nf-platform/upf:2.7.7-p2"
  udm:  "ghcr.io/jacobbista/5g-nf-platform/udm:2.7.7-p0"
  ausf: "ghcr.io/jacobbista/5g-nf-platform/ausf:2.7.7-p0"
  udr:  "ghcr.io/jacobbista/5g-nf-platform/udr:2.7.7-p0"
  nrf:  "ghcr.io/jacobbista/5g-nf-platform/nrf:2.7.7-p0"
  pcf:  "ghcr.io/jacobbista/5g-nf-platform/pcf:2.7.7-p0"
  bsf:  "ghcr.io/jacobbista/5g-nf-platform/bsf:2.7.7-p0"
  nssf: "ghcr.io/jacobbista/5g-nf-platform/nssf:2.7.7-p0"
