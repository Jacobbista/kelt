---
# PHASE 6: UERANSIM & MEC SETUP
# Deploy simulated RAN (gNB + UE) and optional MEC application

- name: "PHASE 6 | Infrastructure Setup"
  hosts: "masters,workers{{ ',edges' if (edge_enabled | default(false) | bool) else '' }}"
  become: true
  tags:
    - phase6
    - infrastructure_setup
    - infra
  vars_files:
    - vars/topology.yml
  roles:
    - role: roles/infrastructure_setup
      when: ueransim_enabled | default(false) | bool

- name: "PHASE 6 | Deploy gNB (simulated base station)"
  hosts: masters
  become: false
  tags:
    - phase6
    - gnb_deployment
    - gnb
  vars_files:
    - vars/topology.yml
  roles:
    - role: roles/gnb_deployment
      when: ueransim_enabled | default(false) | bool

- name: "PHASE 6 | Sync gNB Endpoints (DNS)"
  hosts: masters
  become: false
  tags:
    - phase6
    - endpoints_sync
  vars_files:
    - vars/topology.yml
  roles:
    - role: roles/endpoints_sync
      when: ueransim_enabled | default(false) | bool

- name: "PHASE 6 | Deploy UE (simulated user equipment)"
  hosts: masters
  become: false
  tags:
    - phase6
    - ue_deployment
    - ue
  vars_files:
    - vars/topology.yml
  roles:
    - role: roles/ue_deployment
      when: ueransim_enabled | default(false) | bool

- name: "PHASE 6 | Validate Connectivity"
  hosts: masters
  become: false
  tags:
    - phase6
    - connectivity_validation
    - validation
  vars_files:
    - vars/topology.yml
  roles:
    - role: roles/connectivity_validation
      when: ueransim_enabled | default(false) | bool

- name: "PHASE 6 | Deploy MEC Application (optional)"
  hosts: masters
  become: false
  tags:
    - phase6
    - mec_deployment
    - mec
  vars_files:
    - vars/topology.yml
  roles:
    - role: roles/mec_deployment
      when: ueransim_enabled | default(false) | bool
