---
# Run: ansible-playbook ansible/phases/08-dashboard/playbook.yml [-e dashboard_mode=dev]
# dashboard_mode: prod (default) | dev
- name: Phase 08 - Dashboard Setup
  hosts: control
  gather_facts: true
  vars:
    dashboard_mode: "{{ dashboard_mode | default('prod') }}"
  roles:
    - role: dashboard_setup
