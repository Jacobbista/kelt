---
dashboard_mode: prod
dashboard_source_dir: /vagrant/dashboard
dashboard_dev_source_dir: /vagrant/dashboard
dashboard_work_dir: /home/vagrant/dashboard-work
dashboard_runtime_dir: "{{ dashboard_work_dir if dashboard_mode == 'prod' else dashboard_dev_source_dir }}"
dashboard_backend_dir: "{{ dashboard_runtime_dir }}/backend"
dashboard_frontend_dir: "{{ dashboard_runtime_dir }}/frontend"

dashboard_backend_venv: /home/vagrant/.venvs/dashboard-backend
dashboard_bind_host: "{{ ansible_host | default('192.168.56.13') }}"
dashboard_backend_port: 31880
dashboard_frontend_port: 31573
dashboard_service_user: vagrant
dashboard_backend_service_name: dashboard-backend
dashboard_frontend_service_name: dashboard-frontend
dashboard_admin_token: change-me
dashboard_allow_configmap_write: false

dashboard_install_nodejs: true
