---
# MAIN PLAYBOOK - 5G KUBERNETES TESTBED
# Primary orchestrator that executes all phases in sequence with validation

- name: "🚀 5G KUBERNETES TESTBED DEPLOYMENT"
  hosts: localhost
  gather_facts: true
  vars:
    deployment_start_time: "{{ ansible_date_time.iso8601 }}"
    deployment_t0: "{{ lookup('pipe','date +%s') | int }}"
  tasks:
    - name: "Deps | Enable Ubuntu Universe on master"
      become: true
      apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu jammy universe"
        state: present
      delegate_to: "{{ groups['masters'][0] }}"
      run_once: true
      tags:
        - deps

    - name: "Deps | Update apt cache on master"
      become: true
      apt:
        update_cache: yes
        cache_valid_time: 3600
        force_apt_get: yes
      delegate_to: "{{ groups['masters'][0] }}"
      run_once: true
      tags:
        - deps

    - name: "Deps | Ensure python3-pip on master"
      become: true
      apt:
        name: python3-pip
        state: present
        update_cache: no
        force_apt_get: yes
      delegate_to: "{{ groups['masters'][0] }}"
      run_once: true
      tags:
        - deps

    - name: "Deps | Ensure Python Kubernetes client on master"
      become: true
      pip:
        name: "kubernetes>=29.0.0"
        executable: pip3
      delegate_to: "{{ groups['masters'][0] }}"
      run_once: true
      tags:
        - deps
    - name: "Display deployment phases and start time"
      debug:
        msg: |
          🚀 5G KUBERNETES TESTBED DEPLOYMENT
          ====================================
          Start Time: {{ deployment_start_time }}

          Deployment phases:
          1️⃣   Infrastructure Setup
          2️⃣   Kubernetes Cluster (k3s)
          3️⃣   KubeEdge Integration
          4️⃣   Overlay Network (OVS + Multus)
          5️⃣   5G Core Network Functions
          6️⃣   UERANSIM & MEC (optional via DEPLOY_MODE=full)
          7️⃣   Observability
          8️⃣   IAM (Keycloak)
          9️⃣   Dashboard Control Plane
          🔟   CAMARA Gateway (optional)
          1️⃣1️⃣  Positioning Engine (optional)
          1️⃣2️⃣  Positioning Demo (optional)

          To run a single phase:
          ansible-playbook phases/0X-phase-name/playbook.yml

- name: "PHASE 1: t0"
  hosts: localhost
  gather_facts: false
  tags:
    - phase1
    - infrastructure
  tasks:
    - set_fact:
        phase1_t0: "{{ lookup('pipe','date +%s') | int }}"

- name: "PHASE 1: Infrastructure Setup"
  import_playbook: 01-infrastructure/playbook.yml
  vars:
    phase_name: "Infrastructure Setup"
    phase_number: 1
  tags:
    - phase1
    - infrastructure

- name: "PHASE 1: Validate Infrastructure Setup"
  hosts: localhost
  gather_facts: false
  tags:
    - phase1
    - infrastructure
  tasks:
    - name: "Validation | Check if all nodes are reachable"
      wait_for_connection:
        timeout: 60
      delegate_to: "{{ item }}"
      loop: "{{ groups['all'] | difference(['ansible']) | difference([] if (edge_enabled | default(false) | bool) else groups.get('edges', [])) }}"
      register: connectivity_check
      failed_when: connectivity_check.failed | default(false)

    - debug:
        msg: "✅ PHASE 1: Infrastructure Setup completed successfully"

    - name: "PHASE 1: duration"
      debug:
        msg: >-
          ⏱️ PHASE 1 took
          {{
            ((lookup('pipe','date +%s') | int) - (phase1_t0|default(0)|int))
            | int
          }}s
      when: phase1_t0 is defined

- name: "PHASE 2: t0"
  hosts: localhost
  gather_facts: false
  tags:
    - phase2
    - kubernetes
  tasks:
    - set_fact:
        phase2_t0: "{{ lookup('pipe','date +%s') | int }}"

- name: "PHASE 2: Kubernetes Cluster Setup"
  import_playbook: 02-kubernetes/playbook.yml
  vars:
    phase_name: "Kubernetes Cluster Setup"
    phase_number: 2
  tags:
    - phase2
    - kubernetes

- name: "PHASE 2: Validate Kubernetes Cluster"
  hosts: masters
  gather_facts: false
  become: false
  tags:
    - phase2
    - kubernetes
  tasks:
    - name: "Validation | Get Nodes via kubernetes.core"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
        kubeconfig: "/home/vagrant/kubeconfig"
      register: nodes_info

    - name: "Validation | Assert 2 Ready nodes (master + worker)"
      assert:
        that:
          - (nodes_info.resources | length) >= 2
          - (nodes_info.resources | selectattr('status', 'defined') | list | length) >= 2

    - debug:
        msg: "✅ PHASE 2: Kubernetes Cluster Setup completed successfully"

- name: "PHASE 2: Duration Summary"
  hosts: localhost
  gather_facts: false
  tags:
    - phase2
    - kubernetes
  tasks:
    - name: "PHASE 2: duration"
      debug:
        msg: >-
          ⏱️ PHASE 2 took
          {{
            ((lookup('pipe','date +%s') | int) - (phase2_t0|default(0)|int))
            | int
          }}s
      when: phase2_t0 is defined

- name: "PHASE 3: t0"
  hosts: localhost
  gather_facts: false
  tags:
    - phase3
    - kubeedge
  tasks:
    - set_fact:
        phase3_t0: "{{ lookup('pipe','date +%s') | int }}"

- name: "PHASE 3: KubeEdge Integration"
  import_playbook: 03-kubeedge/playbook.yml
  vars:
    phase_name: "KubeEdge Integration"
    phase_number: 3
  tags:
    - phase3
    - kubeedge

- name: "PHASE 3: Validate KubeEdge Integration"
  hosts: masters
  gather_facts: false
  tags:
    - phase3
    - kubeedge
  tasks:
    - name: "Validation | Get KubeEdge pods"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: kubeedge
        kubeconfig: "/home/vagrant/kubeconfig"
      register: kubeedge_pods_info

    - name: "Validation | Assert some KubeEdge pods are Running"
      assert:
        that:
          - kubeedge_pods_info.resources | selectattr('status.phase','equalto','Running') | list | length > 0

    - name: "Validation | Get all nodes (should now include edge via KubeEdge)"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
        kubeconfig: "/home/vagrant/kubeconfig"
      register: all_nodes_info

    - name: "Validation | Assert expected node count (master + worker + edge if enabled)"
      vars:
        expected_min: "{{ 3 if (edge_enabled | default(false) | bool) else 2 }}"
      assert:
        that:
          - (all_nodes_info.resources | length) >= (expected_min | int)
          - (all_nodes_info.resources | selectattr('status', 'defined') | list | length) >= (expected_min | int)

    - debug:
        msg: "✅ PHASE 3: KubeEdge Integration completed successfully ({{ all_nodes_info.resources | length }} nodes total)"

- name: "PHASE 3: Duration Summary"
  hosts: localhost
  gather_facts: false
  tags:
    - phase3
    - kubeedge
  tasks:
    - name: "PHASE 3: duration"
      debug:
        msg: >-
          ⏱️ PHASE 3 took
          {{
            ((lookup('pipe','date +%s') | int) - (phase3_t0|default(0)|int))
            | int
          }}s
      when: phase3_t0 is defined

- name: "PHASE 4: t0"
  hosts: localhost
  gather_facts: false
  tags:
    - phase4
    - overlay
    - network
  tasks:
    - set_fact:
        phase4_t0: "{{ lookup('pipe','date +%s') | int }}"

- name: "PHASE 4: Overlay Network Setup"
  import_playbook: 04-overlay-network/playbook.yml
  vars:
    phase_name: "Overlay Network Setup"
    phase_number: 4
  tags:
    - phase4
    - overlay
    - network

- name: "PHASE 4: Validate Overlay Network"
  hosts: masters
  gather_facts: false
  tags:
    - phase4
    - overlay
    - network
  tasks:
    - name: "Validation | Get OVS DaemonSets"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: DaemonSet
        namespace: kube-system
        kubeconfig: "/home/vagrant/kubeconfig"
      register: ovs_daemonsets_info

    - name: "Validation | Assert OVS DaemonSets ready"
      vars:
        expected_ds_count: "{{ 2 if (edge_enabled | default(false) | bool) else 1 }}"
      assert:
        that:
          - (
            ovs_daemonsets_info.resources
            | selectattr('metadata.name', 'match', 'ds-net-setup.*')
            | map(attribute='status.numberReady')
            | map('int')
            | sum
            ) >= (expected_ds_count | int)

    - debug:
        msg: "✅ PHASE 4: Overlay Network Setup completed successfully"

- name: "PHASE 4: Duration Summary"
  hosts: localhost
  gather_facts: false
  tags:
    - phase4
    - overlay
    - network
  tasks:
    - name: "PHASE 4: duration"
      debug:
        msg: >-
          ⏱️ PHASE 4 took
          {{
            ((lookup('pipe','date +%s') | int) - (phase4_t0|default(0)|int))
            | int
          }}s
      when: phase4_t0 is defined

- name: "PHASE 5: t0"
  hosts: localhost
  gather_facts: false
  tags:
    - phase5
    - 5g
    - core
  tasks:
    - set_fact:
        phase5_t0: "{{ lookup('pipe','date +%s') | int }}"

- name: "PHASE 5: 5G Core Network Functions"
  import_playbook: 05-5g-core/playbook.yml
  vars:
    phase_name: "5G Core Network Functions"
    phase_number: 5
  tags:
    - phase5
    - 5g
    - core

- name: "PHASE 5: Validate 5G Core Network Functions"
  hosts: masters
  gather_facts: false
  tags:
    - phase5
    - 5g
    - core
  tasks:
    - name: "Validation | Get 5G Core pods"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: 5g
        kubeconfig: "/home/vagrant/kubeconfig"
      register: core_pods_info

    - name: "Validation | Assert 5G Core pods threshold"
      assert:
        that:
          - core_pods_info.resources | selectattr('status.phase','equalto','Running') | list | length >= 5

    - debug:
        msg: "✅ PHASE 5: 5G Core Network Functions completed successfully"

- name: "PHASE 5: Duration Summary"
  hosts: localhost
  gather_facts: false
  tags:
    - phase5
    - 5g
    - core
  tasks:
    - name: "PHASE 5: duration"
      debug:
        msg: >-
          ⏱️ PHASE 5 took
          {{
            ((lookup('pipe','date +%s') | int) - (phase5_t0|default(0)|int))
            | int
          }}s
      when: phase5_t0 is defined

- name: "PHASE 6: t0"
  hosts: localhost
  gather_facts: false
  tags:
    - phase6
    - ueransim
    - mec
  tasks:
    - set_fact:
        phase6_t0: "{{ lookup('pipe','date +%s') | int }}"

- name: "PHASE 6: UERANSIM & MEC Setup"
  import_playbook: 06-ueransim-mec/playbook.yml
  vars:
    phase_name: "UERANSIM & MEC Setup"
    phase_number: 6
  tags:
    - phase6
    - ueransim
    - mec

- name: "PHASE 6: Validate UERANSIM & MEC Setup"
  hosts: masters
  gather_facts: false
  tags:
    - phase6
    - ueransim
    - mec
  tasks:
    - name: "Skip UERANSIM validation when disabled"
      meta: end_play
      when: not (ueransim_enabled | default(false) | bool)

    - name: "Validation | Get UERANSIM pods"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: 5g
        kubeconfig: "/home/vagrant/kubeconfig"
      register: ueransim_pods_info

    - name: "Validation | Compute gNB Running count"
      set_fact:
        gnb_running_count: >-
          {{
            ueransim_pods_info.resources | default([])
            | selectattr('status.phase','equalto','Running')
            | selectattr('metadata.labels.app','defined')
            | selectattr('metadata.labels.app','equalto','gnb')
            | list | length
          }}

    - name: "Validation | Compute UE Running count"
      set_fact:
        ue_running_count: >-
          {{
            ueransim_pods_info.resources | default([])
            | selectattr('status.phase','equalto','Running')
            | selectattr('metadata.labels.app','defined')
            | selectattr('metadata.labels.app','equalto','ue')
            | list | length
          }}

    - name: "Validation | Assert gNB Running >= 1"
      assert:
        that:
          - (gnb_running_count | int) >= 1

    - name: "Validation | Assert UE Running >= 1"
      assert:
        that:
          - (ue_running_count | int) >= 1

    - debug:
        msg: "✅ PHASE 6: UERANSIM & MEC Setup completed successfully"

- name: "PHASE 6: Duration Summary"
  hosts: localhost
  gather_facts: false
  tags:
    - phase6
    - ueransim
    - mec
  tasks:
    - name: "PHASE 6: duration"
      debug:
        msg: >-
          ⏱️ PHASE 6 took
          {{
            ((lookup('pipe','date +%s') | int) - (phase6_t0|default(0)|int))
            | int
          }}s
      when: phase6_t0 is defined

- name: "PHASE 7: Observability Stack"
  import_playbook: 07-observability/playbook.yml
  vars:
    phase_name: "Observability Stack"
    phase_number: 7
  tags:
    - phase7
    - observability
    - monitoring

- name: "PHASE 8: IAM (Keycloak + PostgreSQL)"
  import_playbook: 08-iam/playbook.yml
  vars:
    phase_name: "IAM"
    phase_number: 8
  tags:
    - phase8
    - iam

- name: "PHASE 9: Dashboard Control Plane"
  import_playbook: 09-dashboard/playbook.yml
  vars:
    phase_name: "Dashboard Control Plane"
    phase_number: 9
  tags:
    - phase9
    - dashboard
    - ui

- name: "PHASE 10: Northbound (CAMARA + Positioning)"
  import_playbook: 10-northbound/playbook.yml
  vars:
    phase_name: "Northbound (CAMARA + Positioning)"
    phase_number: 10
  tags:
    - phase10
    - northbound
    - camara
    - positioning
    - mec

- name: "PHASE 11: Front-door (single-origin edge)"
  import_playbook: 11-frontdoor/playbook.yml
  vars:
    phase_name: "Front-door (single-origin edge)"
    phase_number: 11
  tags:
    - phase11
    - frontdoor

- name: "PHASE 12: Edge apps platform"
  import_playbook: 12-apps/playbook.yml
  vars:
    phase_name: "Edge apps platform"
    phase_number: 12
  tags:
    - phase12
    - apps

- name: "🎉 DEPLOYMENT COMPLETED SUCCESSFULLY"
  hosts: localhost
  gather_facts: false
  tasks:
    - set_fact:
        deployment_t1: "{{ lookup('pipe','date +%s') | int }}"

    - name: "Final | Display deployment completion"
      debug:
        msg: |
          🎉 5G KUBERNETES TESTBED DEPLOYMENT COMPLETED
          =============================================
          Start Time: {{ deployment_start_time | default('N/A') }}
          End Time:   {{ ansible_date_time.iso8601 }}
          Total:      {{ ((deployment_t1|default(0)|int) - (deployment_t0|default(0)|int)) | int }}s

          All phases completed successfully:
          ✅ Infrastructure Setup
          ✅ Kubernetes Cluster (k3s)
          ✅ KubeEdge Integration
          ✅ Overlay Network (OVS + Multus)
          ✅ 5G Core Network Functions
          ✅ Observability Stack
          ✅ IAM (Keycloak)
          ✅ Dashboard Control Plane
          ℹ️  UERANSIM & MEC optional (run with DEPLOY_MODE=full)
          ℹ️  CAMARA Gateway / Positioning Engine / Demo optional
      when: deployment_t0 is defined and deployment_t1 is defined
