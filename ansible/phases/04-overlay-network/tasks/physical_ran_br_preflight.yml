---
# Shared preflight for physical RAN resources.
# Detect whether br-ran exists on the worker and expose a fact that callers
# can use to skip n2-physical / AMF attachment without breaking the whole install.
# See docs/deployment/physical-ran.md

- name: Check OVS br-ran exists on worker node
  ansible.builtin.command: ovs-vsctl br-exists br-ran
  delegate_to: "{{ groups['workers'][0] }}"
  become: true
  register: physical_ran_br_check
  failed_when: false
  changed_when: false
  run_once: true

- name: Mark whether physical RAN can be applied in this run
  ansible.builtin.set_fact:
    physical_ran_bridge_available: "{{ (physical_ran_br_check.rc | int) == 0 }}"
  run_once: true

- name: Skip physical RAN resources when br-ran is missing on worker
  ansible.builtin.debug:
    msg: >-
      physical_ran_enabled=true but br-ran is missing on the worker; skipping
      n2-physical / AMF physical RAN for this run. If you configured RAN via
      testbed-config, re-run provisioning from the CLI so it can reload the
      worker with PHYSICAL_RAN_BRIDGE applied, or enable physical RAN later
      from the dashboard.
  when: not (physical_ran_bridge_available | default(false) | bool)
  run_once: true
