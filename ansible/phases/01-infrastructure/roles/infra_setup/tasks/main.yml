---
- name: Install system packages
  ansible.builtin.apt:
    name: "{{ packages_common }}"
    state: present
    update_cache: yes

- name: Set system timezone
  ansible.builtin.timezone:
    name: "{{ timezone_name }}"

- name: Deploy chrony config (NTP sync for VMs)
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    mode: "0644"
  notify: restart chrony

- name: Enable and start chrony
  ansible.builtin.systemd:
    name: chrony
    state: started
    enabled: true
  notify: restart chrony

- name: Force immediate chrony step if offset is large
  ansible.builtin.command: chronyc -a makestep
  register: chrony_makestep
  changed_when: "'System clock was stepped' in chrony_makestep.stdout"
  failed_when: false

- name: Deploy chrony-force-sync oneshot service
  ansible.builtin.template:
    src: chrony-force-sync.service.j2
    dest: /etc/systemd/system/chrony-force-sync.service
    mode: "0644"

- name: Deploy chrony-force-sync timer
  ansible.builtin.template:
    src: chrony-force-sync.timer.j2
    dest: /etc/systemd/system/chrony-force-sync.timer
    mode: "0644"

- name: Enable and start chrony-force-sync timer
  ansible.builtin.systemd:
    name: chrony-force-sync.timer
    state: started
    enabled: true
    daemon_reload: true

- name: Install Open vSwitch on worker/edge
  ansible.builtin.apt:
    name: "{{ openvswitch_pkg }}"
    state: present
  when: enable_ovs_on_workers_edges and (inventory_hostname in groups['workers'] or inventory_hostname in groups['edges'])

- name: Ensure Open vSwitch running on worker/edge
  ansible.builtin.systemd:
    name: openvswitch-switch
    state: started
    enabled: true
  when: enable_ovs_on_workers_edges and (inventory_hostname in groups['workers'] or inventory_hostname in groups['edges'])
  notify: restart openvswitch

- name: Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    reload: yes

# Optional NAT/forwarding for lab uplink
- name: Accept FORWARD from uplink
  ansible.builtin.iptables:
    table: filter
    chain: FORWARD
    in_interface: "{{ uplink_iface }}"
    jump: ACCEPT
    comment: "Allow forwarding from uplink"
  when: enable_node_nat

- name: Accept FORWARD to uplink
  ansible.builtin.iptables:
    table: filter
    chain: FORWARD
    out_interface: "{{ uplink_iface }}"
    jump: ACCEPT
    comment: "Allow forwarding to uplink"
  when: enable_node_nat

- name: SNAT to uplink
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    out_interface: "{{ uplink_iface }}"
    jump: MASQUERADE
    comment: "NAT for internal traffic"
  when: enable_node_nat

- name: Persist iptables rules
  ansible.builtin.command: netfilter-persistent save
  changed_when: true
  when: enable_node_nat

# ==== Journald retention =====================================================
# Unbounded by default, journald grows to 10% of the filesystem: on the worker
# it had reached 3.8G of a 39G disk, competing with container images and PVCs
# on a VM that is never inspected for old logs. Cap it and let systemd vacuum.
- name: Cap journald disk usage
  ansible.builtin.blockinfile:
    path: /etc/systemd/journald.conf
    marker: "# {mark} KELT journald retention"
    block: |
      SystemMaxUse={{ journald_max_use }}
      SystemMaxFileSize={{ journald_max_file_size }}
    create: false
  notify: Restart journald

- name: Manage /etc/hosts from inventory
  when: configure_hosts_from_inventory
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    mode: "0644"

# Lightweight reachability checks (inventory IPs)
- name: Ping peers
  when: validate_connectivity
  ansible.builtin.command: "ping -c 1 -W 2 {{ hostvars[item]['ansible_host'] }}"
  # The inventory always lists the edge host; it only exists when edge_enabled,
  # so pinging it unconditionally failed the whole phase on a 2-VM deploy.
  loop: "{{ groups['all'] | difference([inventory_hostname]) | difference([] if (edge_enabled | default(false) | bool) else (groups['edges'] | default([]))) }}"
  register: connectivity_test
  changed_when: false
  failed_when: false

- name: Fail if any ping failed
  ansible.builtin.fail:
    msg: "Peer {{ item.item }} ({{ hostvars[item.item]['ansible_host'] }}) not reachable from {{ inventory_hostname }}"
  loop: "{{ connectivity_test.results | selectattr('rc','ne',0) | list }}"
  when:
    - validate_connectivity
    - (connectivity_test.results | selectattr('rc','ne',0) | list) | length > 0
