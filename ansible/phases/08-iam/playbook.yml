---
# PHASE 8: IAM (Keycloak + PostgreSQL)
# Deploys Keycloak OAuth2/OIDC server backed by PostgreSQL.
# Provides authentication for the Dashboard (phase 09), the northbound
# services (phase 10): CAMARA gateway and positioning demo, and any other
# service that validates JWTs against the realm JWKS.

- name: "PHASE 8 | Create Namespace"
  hosts: masters
  become: false
  tags:
    - phase8
    - iam
    - namespaces
  tasks:
    # The admin password is read from the environment and falls back to a
    # placeholder, so a hand-run `ansible-playbook` that never sourced
    # .testbed.secrets authenticates against an existing Keycloak with the wrong
    # password: every admin API call 401s and the run can leave a half-applied
    # realm behind. Refuse that combination instead of discovering it midway.
    # `testbed run-phase 08-iam` sources the secrets and never trips this.
    # See QUICKSTART.md "Two interfaces, one behavior".
    - name: Check whether Keycloak is already deployed
      kubernetes.core.k8s_info:
        kind: Deployment
        name: keycloak
        namespace: "{{ iam_namespace }}"
        kubeconfig: "{{ kubeconfig_path }}"
      register: _kc_existing
      run_once: true

    - name: Fail when an existing Keycloak would be reconfigured with the placeholder password
      ansible.builtin.fail:
        msg: >-
          Keycloak is already deployed but KEYCLOAK_ADMIN_PASSWORD is unset, so this run
          would use the placeholder password and every admin API call would fail. Run the
          phase through `testbed run-phase 08-iam`, which sources .testbed.secrets, or
          export the secrets before calling ansible-playbook directly.
      when:
        - _kc_existing.resources | default([]) | length > 0
        - lookup('ansible.builtin.env', 'KEYCLOAK_ADMIN_PASSWORD') | default('', true) | length == 0
      run_once: true

    - name: Ensure iam namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ iam_namespace }}"
        state: present
        definition:
          metadata:
            name: "{{ iam_namespace }}"
            labels:
              name: iam
        kubeconfig: "{{ kubeconfig_path }}"
      run_once: true

- name: "PHASE 8 | Deploy IAM Stack"
  hosts: masters
  become: true
  tags:
    - phase8
    - iam
  roles:
    - roles/keycloak_setup
  post_tasks:
    # Surface the validation command at provision time. The iam test suite is
    # decoupled from deploy (a flaky probe must not fail provisioning), so the
    # operator is pointed at it explicitly here. See tests/iam/test_iam.py.
    - name: Show phase 08 validation hint
      ansible.builtin.debug:
        msg:
          - "Phase 08 (IAM) deployed."
          - "Validate from the HOST machine (not this VM):  cd tests && make iam"
          - "make iam needs the vagrant CLI and host access to the NodePort."
          - "Token checks read CAMARA_CLIENT_SECRET / KEYCLOAK_ADMIN_PASSWORD from .testbed.secrets."
      run_once: true
