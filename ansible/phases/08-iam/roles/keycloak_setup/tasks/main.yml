# ===========================================================================

# ==== Seed CAMARA tenant user (northbound only) ============================
# A third seed account that carries the `org` attribute, so scoped browser
# login is observable out of the box: this user sees only assets of its own
# tenant, while the org-less operator accounts see every tenant. Gated on
# northbound because g-camara-users exists only then.
# See docs/security/iam.md (tenancy model).
# Keycloak 26 validates user attributes against the realm declarative user
# profile and silently DROPS anything not declared, so `org` must be declared
# before any user can carry it (service accounts bypass the profile, which is
# why the camara-api-demo attribute worked without this). Declaring it also
# makes the field editable in the admin console Attributes tab.
- name: Fetch realm user profile
  ansible.builtin.uri:
    url: "http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}{{ keycloak_path_prefix }}/admin/realms/{{ keycloak_realm }}/users/profile"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_admin_token.json.access_token }}"
    return_content: true
    status_code: 200
  register: _kc_user_profile
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when: northbound_enabled | bool

- name: Declare the org attribute in the realm user profile
  ansible.builtin.uri:
    url: "http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}{{ keycloak_path_prefix }}/admin/realms/{{ keycloak_realm }}/users/profile"
    method: PUT
    headers:
      Authorization: "Bearer {{ _kc_admin_token.json.access_token }}"
    body_format: json
    body: "{{ _kc_user_profile.json | combine({'attributes': _kc_user_profile.json.attributes + [_kc_org_attribute_def]}) }}"
    status_code: 200
  vars:
    # Admin-managed only: the tenant binding must not be self-editable by the
    # user it scopes.
    _kc_org_attribute_def:
      name: org
      displayName: CAMARA tenant (org)
      multivalued: false
      permissions:
        view: ["admin"]
        edit: ["admin"]
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when:
    - northbound_enabled | bool
    - _kc_user_profile.json.attributes | selectattr('name', 'equalto', 'org') | list | length == 0

- name: Resolve camara users group id
  ansible.builtin.uri:
    url: "http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}{{ keycloak_path_prefix }}/admin/realms/{{ keycloak_realm }}/groups?search=g-camara-users"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_admin_token.json.access_token }}"
    return_content: true
    status_code: 200
  register: _kc_camara_group
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when: northbound_enabled | bool

- name: Resolve bootstrap tenant user
  ansible.builtin.uri:
    url: "http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}{{ keycloak_path_prefix }}/admin/realms/{{ keycloak_realm }}/users?username={{ dashboard_bootstrap_tenant_username }}&exact=true"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_admin_token.json.access_token }}"
    return_content: true
    status_code: 200
  register: _kc_tenant_user
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when: northbound_enabled | bool

- name: Create bootstrap tenant user when missing
  ansible.builtin.uri:
    url: "http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}{{ keycloak_path_prefix }}/admin/realms/{{ keycloak_realm }}/users"
    method: POST
    headers:
      Authorization: "Bearer {{ _kc_admin_token.json.access_token }}"
    body_format: json
    body:
      username: "{{ dashboard_bootstrap_tenant_username }}"
      enabled: true
      emailVerified: true
      attributes:
        org: ["{{ camara_org }}"]
    status_code: 201
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when:
    - northbound_enabled | bool
    - _kc_tenant_user.json | length == 0

- name: Re-resolve bootstrap tenant user id
  ansible.builtin.uri:
    url: "http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}{{ keycloak_path_prefix }}/admin/realms/{{ keycloak_realm }}/users?username={{ dashboard_bootstrap_tenant_username }}&exact=true"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_admin_token.json.access_token }}"
    return_content: true
    status_code: 200
  register: _kc_tenant_user_resolved
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when: northbound_enabled | bool

# Reasserted on every run (unlike the password): the org attribute IS the
# tenancy binding, so a drifted or hand-cleared value must converge back.
- name: Ensure tenant user carries the org attribute
  ansible.builtin.uri:
    url: "http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}{{ keycloak_path_prefix }}/admin/realms/{{ keycloak_realm }}/users/{{ _kc_tenant_user_resolved.json[0].id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ _kc_admin_token.json.access_token }}"
    body_format: json
    body: "{{ _kc_tenant_user_resolved.json[0] | combine({'attributes': (_kc_tenant_user_resolved.json[0].attributes | default({})) | combine({'org': [camara_org]})}) }}"
    status_code: 204
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when:
    - northbound_enabled | bool
    - _kc_tenant_user_resolved.json | length > 0
    - (_kc_tenant_user_resolved.json[0].attributes | default({})).org | default([]) != [camara_org]

- name: Set bootstrap tenant password (only on first create)
  ansible.builtin.uri:
    url: "http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}{{ keycloak_path_prefix }}/admin/realms/{{ keycloak_realm }}/users/{{ _kc_tenant_user_resolved.json[0].id }}/reset-password"
    method: PUT
    headers:
      Authorization: "Bearer {{ _kc_admin_token.json.access_token }}"
    body_format: json
    body:
      type: password
      temporary: true
      value: "{{ dashboard_bootstrap_tenant_password }}"
    status_code: 204
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when:
    - northbound_enabled | bool
    - _kc_tenant_user.json | length == 0
    - _kc_tenant_user_resolved.json | length > 0

# Two group memberships: CAMARA access (the point of the account) plus a
# read-only dashboard seat, so the scoped view is visible in the console too.
- name: Ensure tenant user in camara and dashboard viewer groups
  ansible.builtin.uri:
    url: "http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}{{ keycloak_path_prefix }}/admin/realms/{{ keycloak_realm }}/users/{{ _kc_tenant_user_resolved.json[0].id }}/groups/{{ item }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ _kc_admin_token.json.access_token }}"
    status_code: 204
  loop:
    - "{{ (_kc_camara_group.json | default([]) | selectattr('name', 'equalto', 'g-camara-users') | list | first | default({})).id | default('') }}"
    - "{{ (_kc_dashboard_viewer_group.json | selectattr('name', 'equalto', 'g-dashboard-viewers') | list | first | default({})).id | default('') }}"
  when:
    - northbound_enabled | bool
    - _kc_tenant_user_resolved.json | length > 0
    - item | length > 0
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
# ===========================================================================

- name: Resolve camara-location-read realm role
  ansible.builtin.uri:
    url: "http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}{{ keycloak_path_prefix }}/admin/realms/{{ keycloak_realm }}/roles/camara-location-read"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_admin_token.json.access_token }}"
    return_content: true
    status_code: 200
  register: _kc_camara_role
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  # The role exists only when northbound is enabled; GET would 404 otherwise.
  when: northbound_enabled | bool

- name: Fetch dashboard-admin role composites
  ansible.builtin.uri:
    url: "http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}{{ keycloak_path_prefix }}/admin/realms/{{ keycloak_realm }}/roles/dashboard-admin/composites/realm"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_admin_token.json.access_token }}"
    return_content: true
    status_code: 200
  register: _kc_dashboard_admin_composites
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when: northbound_enabled | bool

# Make dashboard-admin a composite role that inherits camara-location-read.
# This unifies the role model: a dashboard admin can also call the CAMARA
# Location API from the positioning demo without a separate group membership.
- name: Ensure dashboard-admin includes camara-location-read as composite
  ansible.builtin.uri:
    url: "http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}{{ keycloak_path_prefix }}/admin/realms/{{ keycloak_realm }}/roles/dashboard-admin/composites"
    method: POST
    headers:
      Authorization: "Bearer {{ _kc_admin_token.json.access_token }}"
    body_format: json
    body:
      - id: "{{ _kc_camara_role.json.id }}"
        name: "camara-location-read"
        composite: false
        clientRole: false
        containerId: "{{ keycloak_realm }}"
    status_code: 204
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when:
    - northbound_enabled | bool
    - _kc_dashboard_admin_composites.json | selectattr('name', 'equalto', 'camara-location-read') | list | length == 0

- name: Display IAM deployment summary
  debug:
    msg:
      - "IAM Stack deployed"
      - "Keycloak admin: http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}/admin"
      - "Realm: {{ keycloak_realm }}"
      - "Seed users (force password reset on first login):"
      - "  admin  -> g-dashboard-admins  -> dashboard-admin"
      - "  viewer -> g-dashboard-viewers -> dashboard-viewer"
      - "  {{ dashboard_bootstrap_tenant_username }} -> g-camara-users + g-dashboard-viewers -> org={{ camara_org }} (tenant-scoped){{ '' if (northbound_enabled | bool) else ' [skipped: northbound off]' }}"
      - "Northbound realm objects (camara/positioning/placement clients+role+group): {{ 'enabled' if (northbound_enabled | bool) else 'disabled (no northbound phase on)' }}"
      - "Realm reconcile: {{ keycloak_realm_reconcile | bool }}"
      - "Token endpoint: http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ keycloak_nodeport }}/realms/{{ keycloak_realm }}/protocol/openid-connect/token"
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
