db_uri: mongodb://mongodb:27017/open5gs
logger:
  level: info
amf:
  sbi:
    server:
      - address: 0.0.0.0
        port: 7777
        advertise: amf
    client:
      nrf:
        - uri: http://nrf:7777
      ausf:
        - uri: http://ausf:7777
      udm:
        - uri: http://udm:7777
    no_tls: true
  ngap:
    server:
      - address: 0.0.0.0
        port: 38412
  metrics:
    server:
      - address: 0.0.0.0
        port: 9090
  guami:
    - plmn_id:
        mcc: 001
        mnc: 01
      amf_id:
        region: 2
        set: 1
  tai:
    - plmn_id:
        mcc: 001
        mnc: 01
      tac: 1
  plmn_support:
    - plmn_id:
        mcc: 001
        mnc: 01
      s_nssai:
        - sst: 1
          sd: 1
        - sst: 2
          sd: 1
  security:
    integrity_order: [NIA2, NIA1, NIA0]
    ciphering_order: [NEA0, NEA1, NEA2]
  network_name:
    full: Open5GS
    short: Next
  amf_name: open5gs-amf0
  time:
    t3512:
      value: 540
