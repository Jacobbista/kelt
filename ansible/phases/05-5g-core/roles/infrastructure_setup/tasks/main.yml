---
# INFRASTRUCTURE SETUP FOR 5G CORE
# Prepares cluster infrastructure: storage, CRI config, image pre-pulling

- name: Check if hostpath StorageClass already exists
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: StorageClass
    name: "{{ storage_class_name }}"
    kubeconfig: "{{ kubeconfig_path }}"
  register: storage_class_check
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true

- name: Create hostpath StorageClass (only if it doesn't exist)
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_path }}"
    definition:
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: "{{ storage_class_name }}"
      provisioner: "{{ storage_provisioner }}"
      volumeBindingMode: WaitForFirstConsumer
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when: storage_class_check.resources | length == 0

- name: Configure crictl on worker (k3s containerd)
  copy:
    content: |
      runtime-endpoint: {{ worker_cri_endpoint }}
      image-endpoint: {{ worker_cri_endpoint }}
      timeout: 10
      debug: false
    dest: /etc/crictl.yaml
    mode: "0644"
  delegate_to: "{{ groups['workers'][0] }}"
  run_once: true

- name: Configure crictl on edge (standalone containerd)
  copy:
    content: |
      runtime-endpoint: {{ edge_cri_endpoint }}
      image-endpoint: {{ edge_cri_endpoint }}
      timeout: 10
      debug: false
    dest: /etc/crictl.yaml
    mode: "0644"
  delegate_to: "{{ groups['edges'][0] }}"
  run_once: true
  when: edge_enabled | default(false) | bool

# ctr with -n k8s.io pulls into the namespace K3s/kubelet uses.
# crictl pull uses the 'default' namespace — images end up invisible to pods.
# `timeout 300` (unix command) kills ctr after 5min — ctr has no --timeout flag.
# Pull only images NOT already present, with real retries (retries needs `until`).
# `ctr pull` hits the registry even for a present image, so an unconditional pull
# hard-fails a re-run on a transient DNS/registry blip; listing first and skipping
# present images makes the phase robust and avoids needless registry traffic.
- name: List container images already present on worker
  command: k3s ctr -n k8s.io images ls -q
  delegate_to: "{{ groups['workers'][0] }}"
  run_once: true
  changed_when: false
  register: prepull_present_worker

- name: Pre-pull container images on worker (only if absent, retry transient blips)
  command: >
    timeout 300 k3s ctr -n k8s.io images pull {{ item }}
  loop: "{{ ([mongodb_image, network_setup_image] + nf_images.values() | list) | unique }}"
  loop_control:
    label: "{{ item.split('/')[-1] }}"
  delegate_to: "{{ groups['workers'][0] }}"
  run_once: true
  register: prepull_result
  retries: 3
  delay: 10
  until: prepull_result.rc == 0
  changed_when: prepull_result.rc == 0
  when: item not in (prepull_present_worker.stdout | default(''))

- name: List container images already present on edge
  command: ctr --address /run/containerd/containerd.sock -n k8s.io images ls -q
  delegate_to: "{{ groups['edges'][0] }}"
  run_once: true
  changed_when: false
  register: prepull_present_edge
  when: edge_enabled | default(false) | bool

- name: Pre-pull container images on edge (only if absent, retry transient blips)
  command: >
    timeout 300 ctr --address /run/containerd/containerd.sock
    -n k8s.io images pull {{ item }}
  loop: "{{ ([mongodb_image, network_setup_image] + nf_images.values() | list) | unique }}"
  loop_control:
    label: "{{ item.split('/')[-1] }}"
  delegate_to: "{{ groups['edges'][0] }}"
  run_once: true
  register: prepull_edge_result
  retries: 3
  delay: 10
  until: prepull_edge_result.rc == 0
  changed_when: prepull_edge_result.rc == 0
  when:
    - edge_enabled | default(false) | bool
    - item not in (prepull_present_edge.stdout | default(''))
