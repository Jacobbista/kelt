---
# NETWORK FUNCTIONS DEPLOYMENT
# Deploy 5G Core NFs using templates (no inline YAML)

- name: Load topology for per-cell AMF interfaces
  include_vars:
    file: "{{ playbook_dir }}/../06-ueransim-mec/vars/topology.yml"
  run_once: true

- name: Build per-cell N2 networks for AMF
  set_fact:
    # Dynamic IP from Whereabouts - gNB discovers AMF IP via init container
    # No static IPs - fully cloud-native and scalable
    amf_cell_n2_networks: >-
      {{ amf_cell_n2_networks | default([]) + [{
        'name': 'n2-cell-' ~ item.id,
        'interface': 'n2c' ~ item.id
      }] }}
  loop: "{{ ueransim_topology.cells }}"
  loop_control:
    label: "cell-{{ item.id }}"
  run_once: true

- name: Update network_functions with AMF per-cell networks
  set_fact:
    network_functions_updated: "{{ network_functions_updated | default([]) + [item | combine({'networks': item.networks + amf_cell_n2_networks}) if item.name == 'amf' else item] }}"
  loop: "{{ network_functions }}"
  loop_control:
    label: "{{ item.name }}"
  run_once: true

- name: Replace network_functions with updated version
  set_fact:
    network_functions: "{{ network_functions_updated }}"
  run_once: true

# Same guard as multus_install / dashboard: do not attach n2-physical to AMF without br-ran.
- name: Physical RAN preflight — br-ran must exist on worker
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../04-overlay-network/tasks/physical_ran_br_preflight.yml"
  when:
    - physical_ran_enabled | default(false) | bool
    - not (physical_ran_skip_bridge_check | default(false) | bool)
  run_once: true

# Add physical RAN interface to AMF (for femtocell/small cell connectivity)
# This gives AMF a dedicated macvlan interface on the physical RAN network
# so physical gNBs can connect via NGAP/SCTP
- name: Build physical RAN N2 network for AMF
  set_fact:
    amf_physical_ran_network:
      - name: "n2-physical"
        interface: "n2phy"
        ips: ["{{ amf_physical_ran_ip }}/24"]
  when: physical_ran_enabled | default(false) | bool
  run_once: true

- name: Update network_functions with AMF physical RAN interface
  set_fact:
    network_functions_with_physical: []
  when: physical_ran_enabled | default(false) | bool
  run_once: true

- name: Add physical RAN interface to AMF networks
  set_fact:
    network_functions_with_physical: >-
      {{ network_functions_with_physical + 
         [item | combine({'networks': item.networks + amf_physical_ran_network})] 
         if item.name == 'amf' 
         else network_functions_with_physical + [item] }}
  loop: "{{ network_functions }}"
  loop_control:
    label: "{{ item.name }}"
  when: physical_ran_enabled | default(false) | bool
  run_once: true

- name: Replace network_functions with physical RAN version
  set_fact:
    network_functions: "{{ network_functions_with_physical }}"
  when: physical_ran_enabled | default(false) | bool
  run_once: true

# Pass PHYSICAL_RAN_SUBNET to UPF-Cloud so its init script can add a
# return route to the gNB subnet through the worker's br-n3 gateway.
- name: Init UPF physical RAN env list
  set_fact:
    network_functions_with_upf_ran: []
  when: physical_ran_enabled | default(false) | bool
  run_once: true

- name: Add PHYSICAL_RAN_SUBNET env to UPF-Cloud
  set_fact:
    network_functions_with_upf_ran: >-
      {{ network_functions_with_upf_ran +
         [item | combine({'extra_env': item.extra_env + [{'name': 'PHYSICAL_RAN_SUBNET', 'value': physical_ran_subnet}]})]
         if item.name == 'upf-cloud'
         else network_functions_with_upf_ran + [item] }}
  loop: "{{ network_functions }}"
  loop_control:
    label: "{{ item.name }}"
  when: physical_ran_enabled | default(false) | bool
  run_once: true

- name: Replace network_functions with UPF RAN version
  set_fact:
    network_functions: "{{ network_functions_with_upf_ran }}"
  when: physical_ran_enabled | default(false) | bool
  run_once: true

- name: Deploy MongoDB
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_path }}"
    template: "{{ playbook_dir }}/templates/mongodb-deployment.yaml.j2"
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true

- name: Deploy MongoDB Service
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_path }}"
    template: "{{ playbook_dir }}/templates/mongodb-service.yaml.j2"
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true

- name: Wait for MongoDB to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: mongodb
    namespace: "{{ namespace_5g }}"
    kubeconfig: "{{ kubeconfig_path }}"
  register: mongodb_status
  retries: 30
  delay: 10
  until: >-
    mongodb_status.resources | length > 0 and
    mongodb_status.resources[0].status.availableReplicas | default(0) >= 1
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true

- name: Deploy Network Function Deployments
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_path }}"
    template: "{{ playbook_dir }}/templates/nf-deployment.yaml.j2"
  vars:
    nf: "{{ item }}"
  loop: "{{ network_functions }}"
  when: item.name != 'mongodb'
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true

- name: Deploy Network Function Services
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_path }}"
    template: "{{ playbook_dir }}/templates/nf-service.yaml.j2"
  vars:
    nf: "{{ item }}"
  loop: "{{ network_functions }}"
  when: item.name != 'mongodb'
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
