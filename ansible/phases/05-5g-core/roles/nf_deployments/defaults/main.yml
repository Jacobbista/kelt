---
# Network Functions deployment defaults
kubeconfig_path: "/home/vagrant/kubeconfig"
namespace_5g: "5g"

# Container images
# mongodb_image defined in all.yml (shared across roles)
# Per-NF images come from nf_images in all.yml (immutable tags: <upstream>-p<N>)

# MongoDB persistence
# Use K3s default dynamic local-path provisioner so subscribers survive pod restarts.
# See docs/architecture/subscriber-persistence.md
mongodb_pvc_name: "mongodb-data"
mongodb_pvc_size: "1Gi"
mongodb_pvc_storage_class: "local-path"

# Subscriber snapshot ConfigMap (see docs/architecture/subscriber-persistence.md)
subscriber_snapshot_configmap: "subscribers-snapshot"

# Network Functions definitions
network_functions:
  # MongoDB (Database)
  - name: mongodb
    replicas: 1
    node: worker
    ports:
      - { port: 27017, name: mongodb }
    db_required: false

  # NRF (Network Repository Function)
  - name: nrf
    image: "{{ nf_images.nrf }}"
    replicas: 1
    node: worker
    ports:
      - { port: 7777, name: sbi }
      - { port: 9090, name: metrics }

  # AMF (Access and Mobility Management Function)
  - name: amf
    image: "{{ nf_images.amf }}"
    replicas: 1
    node: worker
    privileged: true
    ports:
      - { port: 7777, name: sbi }
      - { port: 38412, name: ngap, protocol: SCTP }
      - { port: 9090, name: metrics }
    networks:
      - { name: "n1-net", interface: "n1", ips: ["{{ amf_n1_ip }}/24"] }
      - { name: "n2-net", interface: "n2", ips: ["{{ amf_n2_ip }}/24"] }
    # Per-cell N2 interfaces will be added dynamically via amf_cell_networks
    wait_interfaces: ["n2"]
    extra_env:
      - { name: "STATIC_IP", value: "{{ amf_n2_ip }}" }
    enable_rp_filter_fix: true

  # SMF (Session Management Function)
  - name: smf
    image: "{{ nf_images.smf }}"
    replicas: 1
    node: worker
    privileged: true
    ports:
      - { port: 7777, name: sbi }
      - { port: 8805, name: pfcp, protocol: UDP }
      - { port: 9090, name: metrics }
    networks:
      - { name: "n4-net", interface: "n4", ips: ["{{ smf_n4_ip }}/24"] }

  # UPF Edge (User Plane Function - Edge)
  # DISABLED: CNI route conflict on edge node - see docs/known-issues/upf-edge-cni-route-conflict.md
  - name: upf-edge
    image: "{{ nf_images.upf }}"
    replicas: 0
    node: edge
    privileged: true
    ports:
      - { port: 2152, name: gtpu, protocol: UDP }
      - { port: 8805, name: pfcp, protocol: UDP }
      - { port: 9090, name: metrics }
    networks:
      - { name: "n3-net", interface: "n3", ips: ["{{ upf_edge_n3_ip }}/24"] }
      - { name: "n4-net", interface: "n4", ips: ["{{ upf_edge_n4_ip }}/24"] }
      - { name: "n6e-net", namespace: "mec", interface: "n6" }
    wait_interfaces: ["n3", "n6"]
    setup_script: "upf_edge_init.sh"
    # iperf3 server runs in main container cgroup (postStart -D daemonize survives).
    # Started here, not in init script, because initContainers terminate child procs on exit.
    lifecycle_post_start: "mkdir -p /var/log && iperf3 -s -B 10.46.0.1 -fm --logfile /var/log/iperf3-server.log -D"

  # UPF Cloud (User Plane Function - Cloud)
  - name: upf-cloud
    image: "{{ nf_images.upf }}"
    replicas: 1
    node: worker
    privileged: true
    ports:
      - { port: 2152, name: gtpu, protocol: UDP }
      - { port: 8805, name: pfcp, protocol: UDP }
      - { port: 9090, name: metrics }
    networks:
      - { name: "n3-net", interface: "n3", ips: ["{{ upf_cloud_n3_ip }}/24"] }
      - { name: "n4-net", interface: "n4", ips: ["{{ upf_cloud_n4_ip }}/24"] }
      - { name: "n6c-net", interface: "n6" }
      - { name: "n6m-net", namespace: "mec", interface: "n6m" }
    wait_interfaces: ["n3", "n6"]
    setup_script: "upf_cloud_init.sh"
    # iperf3 server runs in main container cgroup (postStart -D daemonize survives).
    # Started here, not in init script, because initContainers terminate child procs on exit.
    lifecycle_post_start: "mkdir -p /var/log && iperf3 -s -B 10.45.0.1 -fm -i 0.1 --logfile /var/log/iperf3-server.log -D"

  # UDM (Unified Data Management)
  - name: udm
    image: "{{ nf_images.udm }}"
    replicas: 1
    node: worker
    ports:
      - { port: 7777, name: sbi }
      - { port: 9090, name: metrics }

  # UDR (Unified Data Repository)
  - name: udr
    image: "{{ nf_images.udr }}"
    replicas: 1
    node: worker
    ports:
      - { port: 7777, name: sbi }
      - { port: 9090, name: metrics }

  # PCF (Policy Control Function)
  - name: pcf
    image: "{{ nf_images.pcf }}"
    replicas: 1
    node: worker
    ports:
      - { port: 7777, name: sbi }
      - { port: 9090, name: metrics }

  # BSF (Binding Support Function)
  - name: bsf
    image: "{{ nf_images.bsf }}"
    replicas: 1
    node: worker
    ports:
      - { port: 7777, name: sbi }
      - { port: 9090, name: metrics }

  # NSSF (Network Slice Selection Function)
  - name: nssf
    image: "{{ nf_images.nssf }}"
    replicas: 1
    node: worker
    ports:
      - { port: 7777, name: sbi }
      - { port: 9090, name: metrics }

  # AUSF (Authentication Server Function)
  - name: ausf
    image: "{{ nf_images.ausf }}"
    replicas: 1
    node: worker
    ports:
      - { port: 7777, name: sbi }
      - { port: 9090, name: metrics }

# Experimental NFs — disabled by default (replicas: 0).
# Enable individual NFs via dashboard or ansible extra-vars.
# Each entry follows the same schema as network_functions entries plus:
#   enabled: false  → replicas forced to 0 regardless of replicas field
# See docs/architecture/nf-platform.md for adding new experimental NFs.
experimental_nfs: []
