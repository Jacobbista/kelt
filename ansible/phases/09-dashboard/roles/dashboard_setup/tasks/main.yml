---
# Backend + cluster pod are baseline. Vite dev frontend is opt-in via
# dashboard_dev_enabled. The two frontends coexist on different IPs
# (cluster pod = worker NodePort, Vite dev = ansible VM port) so no
# port conflict and either can be reached at any time.

- name: Ensure system prerequisites
  become: true
  ansible.builtin.apt:
    name:
      - rsync
      - python3-venv
      - python3-pip
      - curl
      - ca-certificates
      - gnupg
    state: present
    update_cache: true

- name: Add NodeSource 20.x repository
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  args:
    executable: /bin/bash
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js 20
  become: true
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Fetch kubeconfig from master for dashboard backend
  ansible.builtin.slurp:
    src: "{{ kubeconfig_path }}"
  delegate_to: "{{ groups['masters'][0] }}"
  register: _dashboard_kubeconfig

- name: Write kubeconfig on ansible VM (rewrite server to master IP)
  ansible.builtin.copy:
    dest: "{{ kubeconfig_path }}"
    mode: "0600"
    content: "{{ _dashboard_kubeconfig.content | b64decode | regex_replace('https://127\\.0\\.0\\.1:6443', 'https://' + hostvars[groups['masters'][0]]['ansible_host'] + ':6443') }}"

- name: Stop dashboard backend before redeployment
  become: true
  ansible.builtin.systemd:
    name: "{{ dashboard_backend_service_name }}"
    state: stopped
  failed_when: false

- name: Ensure dashboard work directory exists
  ansible.builtin.file:
    path: "{{ dashboard_work_dir }}"
    state: directory
    mode: "0755"

- name: Sync dashboard sources from ansible-ro to writable workspace
  ansible.builtin.command:
    cmd: >-
      rsync -a --delete
      --exclude node_modules
      --exclude venv
      "{{ dashboard_source_dir }}/"
      "{{ dashboard_work_dir }}/"
  changed_when: true

- name: Ensure dashboard launcher scripts are executable
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0755"
  loop:
    - "{{ dashboard_work_dir }}/run-backend.sh"
    - "{{ dashboard_work_dir }}/run-frontend.sh"

- name: Ensure shared backend venv parent exists
  ansible.builtin.file:
    path: "{{ dashboard_backend_venv | dirname }}"
    state: directory
    mode: "0755"

- name: Ensure backend Python venv exists
  ansible.builtin.command:
    cmd: "python3 -m venv {{ dashboard_backend_venv }}"
    creates: "{{ dashboard_backend_venv }}/bin/activate"

- name: Install backend dependencies
  ansible.builtin.pip:
    requirements: "{{ dashboard_backend_dir }}/requirements.txt"
    virtualenv: "{{ dashboard_backend_venv }}"

- name: Create backend runtime environment file
  ansible.builtin.copy:
    dest: "{{ dashboard_backend_dir }}/.env.runtime"
    mode: "0600"
    content: |
      DASHBOARD_ADMIN_TOKEN={{ dashboard_admin_token }}
      DASHBOARD_BACKEND_SERVICE_NAME={{ dashboard_backend_service_name }}
      DASHBOARD_FRONTEND_SERVICE_NAME={{ dashboard_frontend_service_name }}
      DASHBOARD_ALLOW_CONFIGMAP_WRITE={{ dashboard_allow_configmap_write | bool | lower }}
      DASHBOARD_AUDIT_LOG_PATH={{ dashboard_backend_dir }}/logs/audit.log
      DASHBOARD_SKIP_AUTH={{ (not (dashboard_auth_enabled | bool)) | lower }}
      DASHBOARD_KEYCLOAK_URL={{ dashboard_keycloak_url }}
      DASHBOARD_KEYCLOAK_REALM={{ dashboard_keycloak_realm }}
      DASHBOARD_KEYCLOAK_ACCEPTED_CLIENTS={{ dashboard_keycloak_accepted_clients }}
      DASHBOARD_KEYCLOAK_PATH_PREFIX={{ dashboard_keycloak_path_prefix }}
      DASHBOARD_CORS_ORIGIN={{ dashboard_cors_origin }}
      DASHBOARD_DEV_EXTERNAL_URL={{ dashboard_dev_external_url }}

- name: Create frontend environment file (used by Vite dev only)
  ansible.builtin.copy:
    dest: "{{ dashboard_frontend_dir }}/.env"
    mode: "0644"
    content: |
      # Reverse-proxy targets for Vite dev. The browser hits the dev frontend
      # origin (ansible VM NodePort) and Vite forwards /api, /health, /auth
      # to these targets. Cluster pod uses its own nginx.conf delivered via
      # ConfigMap, so this file is irrelevant in the prod path.
      VITE_BACKEND_TARGET=http://127.0.0.1:{{ dashboard_backend_port }}
      VITE_AUTH_ENABLED={{ dashboard_auth_enabled | bool | lower }}
      VITE_KEYCLOAK_PROXY_TARGET={{ dashboard_keycloak_proxy_target }}
      VITE_KEYCLOAK_AUTHORITY={{ dashboard_keycloak_external_url }}{{ dashboard_keycloak_path_prefix }}/realms/{{ dashboard_keycloak_realm }}
      VITE_KEYCLOAK_CLIENT_ID={{ dashboard_keycloak_client_id }}
  when: dashboard_dev_enabled | bool

- name: Install frontend dependencies
  ansible.builtin.command:
    cmd: npm install
    chdir: "{{ dashboard_frontend_dir }}"
  changed_when: true
  when: dashboard_dev_enabled | bool

- name: Install backend systemd service
  become: true
  ansible.builtin.template:
    src: dashboard-backend.service.j2
    dest: "/etc/systemd/system/{{ dashboard_backend_service_name }}.service"
    mode: "0644"
  register: backend_service_unit

- name: Install frontend systemd service (dev only)
  become: true
  ansible.builtin.template:
    src: dashboard-frontend.service.j2
    dest: "/etc/systemd/system/{{ dashboard_frontend_service_name }}.service"
    mode: "0644"
  register: frontend_service_unit
  when: dashboard_dev_enabled | bool

- name: Install watchdog systemd service
  become: true
  ansible.builtin.template:
    src: dashboard-watchdog.service.j2
    dest: /etc/systemd/system/dashboard-watchdog.service
    mode: "0644"
  register: watchdog_service_unit

- name: Reload systemd after unit changes
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when: >-
    backend_service_unit.changed or
    (frontend_service_unit.changed | default(false)) or
    watchdog_service_unit.changed

- name: Allow dashboard user to restart backend via systemctl (in-app recovery)
  become: true
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/dashboard-backend-restart"
    mode: "0440"
    content: |
      {{ dashboard_service_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl restart {{ dashboard_backend_service_name }}

# Sudoers rule scoped to the dev frontend systemd unit only. Lets the
# backend toggle the Vite dev server from the prod UI (DevModeIndicator
# in the sidebar) without giving up arbitrary sudo on the ansible VM.
- name: Allow dashboard user to start/stop dev frontend via systemctl
  become: true
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/dashboard-dev-frontend-control"
    mode: "0440"
    content: |
      {{ dashboard_service_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl start {{ dashboard_frontend_service_name }}
      {{ dashboard_service_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl stop {{ dashboard_frontend_service_name }}
      {{ dashboard_service_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl is-active {{ dashboard_frontend_service_name }}

- name: Enable and start dashboard backend service
  become: true
  ansible.builtin.systemd:
    name: "{{ dashboard_backend_service_name }}"
    enabled: true
    state: started

- name: Enable and start dashboard dev frontend service
  become: true
  ansible.builtin.systemd:
    name: "{{ dashboard_frontend_service_name }}"
    enabled: true
    state: started
  when: dashboard_dev_enabled | bool

- name: Stop dashboard dev frontend service (opt-out)
  become: true
  ansible.builtin.systemd:
    name: "{{ dashboard_frontend_service_name }}"
    state: stopped
  failed_when: false
  when: not (dashboard_dev_enabled | bool)

- name: Enable and start dashboard watchdog service
  become: true
  ansible.builtin.systemd:
    name: dashboard-watchdog
    enabled: true
    state: started

- name: Ensure dashboard services are healthy
  ansible.builtin.command:
    cmd: "systemctl is-active {{ item }}"
  become: true
  register: dashboard_service_status
  changed_when: false
  failed_when: false
  until: dashboard_service_status.stdout | trim == "active"
  retries: 20
  delay: 2
  loop: "{{ [dashboard_backend_service_name] + ([dashboard_frontend_service_name] if (dashboard_dev_enabled | bool) else []) }}"

- name: Fail with explicit service status if not active
  ansible.builtin.fail:
    msg: >-
      Service {{ item.item }} is not active after startup wait.
      state={{ item.stdout | trim }}
  when: (item.stdout | trim) != "active"
  loop: "{{ dashboard_service_status.results }}"

# ====================================================================
# Cluster pod baseline. Always provisioned unless explicitly disabled via
# dashboard_cluster_enabled=false. Pulls the prebuilt frontend image from
# GHCR and reverse-proxies /api, /health, /watchdog to the backend on the
# ansible VM and /auth to Keycloak on the worker NodePort. Backend stays
# on the ansible VM, no cluster RBAC migration needed.
# ====================================================================

- name: Ensure dashboard namespace exists
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    state: present
    definition:
      metadata:
        name: "{{ dashboard_namespace }}"
        labels:
          name: "{{ dashboard_namespace }}"
    kubeconfig: "{{ kubeconfig_path }}"
  when: dashboard_cluster_enabled | bool

- name: Pre-pull dashboard frontend image on worker
  ansible.builtin.command:
    cmd: "k3s ctr -n k8s.io images pull {{ dashboard_frontend_image }}"
  delegate_to: "{{ groups['workers'][0] }}"
  become: true
  run_once: true
  changed_when: false
  register: prepull_dashboard
  failed_when: prepull_dashboard.rc != 0 and 'already exists' not in (prepull_dashboard.stderr | default(''))
  when: dashboard_cluster_enabled | bool

- name: Apply dashboard frontend ConfigMap (nginx.conf + env-config.js)
  kubernetes.core.k8s:
    state: present
    apply: true
    force: true
    kubeconfig: "{{ kubeconfig_path }}"
    definition: "{{ lookup('template', role_path + '/templates/dashboard-frontend-configmap.yaml.j2') | from_yaml }}"
  when: dashboard_cluster_enabled | bool

- name: Apply dashboard frontend Deployment
  kubernetes.core.k8s:
    state: present
    apply: true
    force: true
    kubeconfig: "{{ kubeconfig_path }}"
    definition: "{{ lookup('template', role_path + '/templates/dashboard-frontend-deployment.yaml.j2') | from_yaml }}"
  when: dashboard_cluster_enabled | bool

- name: Apply dashboard frontend Service
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_path }}"
    definition: "{{ lookup('template', role_path + '/templates/dashboard-frontend-service.yaml.j2') | from_yaml }}"
  when: dashboard_cluster_enabled | bool

# Image tag is mutable (:latest) so the Deployment manifest hash does not
# change when CI publishes a new digest. A rollout restart is required
# to make kubelet honor imagePullPolicy: Always and pull the fresh image.
- name: Rollout restart dashboard frontend Deployment
  ansible.builtin.command:
    cmd: >-
      k3s kubectl -n {{ dashboard_namespace }} rollout restart deploy/dashboard-frontend
  delegate_to: "{{ groups['masters'][0] }}"
  become: true
  changed_when: true
  when: dashboard_cluster_enabled | bool

- name: Wait for dashboard frontend pod ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: dashboard-frontend
    namespace: "{{ dashboard_namespace }}"
    kubeconfig: "{{ kubeconfig_path }}"
  register: dashboard_cluster_deploy
  retries: "{{ dashboard_cluster_ready_retries }}"
  delay: "{{ dashboard_cluster_ready_delay }}"
  until: >-
    dashboard_cluster_deploy.resources | length > 0 and
    dashboard_cluster_deploy.resources[0].status.availableReplicas | default(0) >= 1
  when: dashboard_cluster_enabled | bool

# Tear down cluster pod resources when explicitly disabled. Namespace is
# left in place to avoid disturbing manually created workloads.
- name: Tear down dashboard cluster Deployment
  kubernetes.core.k8s:
    state: absent
    kubeconfig: "{{ kubeconfig_path }}"
    api_version: apps/v1
    kind: Deployment
    name: dashboard-frontend
    namespace: "{{ dashboard_namespace }}"
  when: not (dashboard_cluster_enabled | bool)

- name: Tear down dashboard cluster Service
  kubernetes.core.k8s:
    state: absent
    kubeconfig: "{{ kubeconfig_path }}"
    api_version: v1
    kind: Service
    name: dashboard-frontend
    namespace: "{{ dashboard_namespace }}"
  when: not (dashboard_cluster_enabled | bool)

- name: Tear down dashboard cluster ConfigMap
  kubernetes.core.k8s:
    state: absent
    kubeconfig: "{{ kubeconfig_path }}"
    api_version: v1
    kind: ConfigMap
    name: dashboard-frontend-config
    namespace: "{{ dashboard_namespace }}"
  when: not (dashboard_cluster_enabled | bool)

- name: Dashboard endpoints
  ansible.builtin.debug:
    msg:
      - "Cluster UI (prod):     http://{{ hostvars[groups['workers'][0]]['ansible_host'] }}:{{ dashboard_cluster_nodeport }}  (cluster_enabled={{ dashboard_cluster_enabled }})"
      - "Vite dev UI:           http://{{ dashboard_bind_host }}:{{ dashboard_frontend_port }}  (dev_enabled={{ dashboard_dev_enabled }})"
      - "Backend API:           http://{{ dashboard_bind_host }}:{{ dashboard_backend_port }}"
      - "Backend API docs:      http://{{ dashboard_bind_host }}:{{ dashboard_backend_port }}/docs"
