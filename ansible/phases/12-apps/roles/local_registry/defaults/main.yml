---
# In-cluster registry:2 for the edge apps platform. Most coordinates come from
# all.yml (apps_registry_*); these are role-local knobs. The registry is exposed
# on a NodePort on the worker only and is NEVER routed through the front-door /
# Cloudflare tunnel: it speaks plain HTTP and is protected by basic-auth + the
# trusted LAN/Tailscale transport. See docs/architecture/edge-apps.md.

registry_namespace: "{{ apps_namespace }}"
registry_app_name: registry
registry_container_port: 5000
registry_htpasswd_realm: "KELT Registry"
# Where k3s reads its registry mirror config on the worker.
registry_k3s_config_dir: /etc/rancher/k3s
