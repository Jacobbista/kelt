---
# APPS PLATFORM
# Namespaces the edge apps platform uses: `apps_namespace` (mec) is where MEC apps
# deploy via the dashboard Apps page; `apps_registry_namespace` (apps) holds the
# local registry. Both ensured idempotently (mec usually already exists from the
# overlay/MEC phases). See docs/architecture/edge-apps.md.

- name: Ensure edge-apps namespaces exist
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    state: present
    definition:
      metadata:
        name: "{{ item }}"
        labels:
          name: "{{ item }}"
          kelt.io/surface: apps
    kubeconfig: "{{ kubeconfig_path }}"
  loop:
    - "{{ apps_namespace }}"
    - "{{ apps_registry_namespace }}"
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
