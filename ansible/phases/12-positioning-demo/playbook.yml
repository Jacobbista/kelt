---
# PHASE 12: Positioning Demo App
# Deploys the 3D positioning demo MEC application (React + Three.js).
# Authenticates via Keycloak, consumes CAMARA Location API.
# Runs in the mec namespace (already created by Phase 05).
# Image built from github.com/Jacobbista/positioning-demo via nf-platform CI.

- name: "PHASE 12 | Deploy Positioning Demo"
  hosts: masters
  become: true
  tags:
    - phase12
    - positioning-demo
    - mec
  roles:
    - role: roles/demo_setup
      when: positioning_demo_enabled | default(true) | bool
