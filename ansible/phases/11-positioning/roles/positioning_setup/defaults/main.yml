---
positioning_enabled: true
positioning_namespace: positioning

positioning_engine_image: "ghcr.io/jacobbista/5g-northbound/positioning-engine:0.1.0"
positioning_engine_nodeport: 31930

# Adapter URLs (CSV) the engine polls for measurements.
# Empty by default: the engine falls back to its embedded mock random walk so
# the testbed demo works out of the box without any positioning source.
# Real adapters (wifi-positioning, vendor-specific) are provisioned at runtime
# via the dashboard, not by this phase. See docs/architecture/positioning-adapters.md.
engine_adapter_urls: ""

# Devices the engine tracks. Mock fallback iterates this list when no adapter is
# configured. Real device ids are added through the dashboard along with the
# adapter that resolves them.
engine_device_ids: "demo-001"

# WebSocket position broadcast interval, milliseconds.
engine_websocket_interval_ms: 500

# Floor plan defaults (passed to the engine for mock bounds and to the demo
# for 3D rendering). Override at deploy time for real room dimensions:
#   -e floor_width_m=12 -e floor_depth_m=18
floor_width_m: 20
floor_depth_m: 30
floor_height_m: 3

positioning_ready_retries: 6
positioning_ready_delay: 10
