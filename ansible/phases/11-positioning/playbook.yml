---
# PHASE 11: Positioning Engine
# Deploys the thin positioning engine that fuses measurements from one or
# more positioning adapters. Concrete adapters (wifi-positioning, vendor
# adapters) are not provisioned here; they are added at runtime via the
# dashboard adapter-provisioning workflow, following the public HTTP
# adapter contract. With no adapters configured the engine runs an
# embedded mock fallback so the demo works out of the box.
# Image built from the 5g-northbound monorepo and published to GHCR.

- name: "PHASE 11 | Positioning Engine"
  hosts: masters
  become: true
  tags:
    - phase11
    - positioning
  roles:
    - role: roles/positioning_setup
      when: positioning_enabled | default(true) | bool
