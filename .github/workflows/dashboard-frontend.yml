name: dashboard-frontend image

# Build and push the dashboard frontend image to GHCR. Triggered by tags
# of the form dashboard-frontend-vX.Y.Z so the dashboard release timeline
# stays independent from the rest of the testbed. Manual dispatch is also
# allowed for ad-hoc builds.

on:
  push:
    tags:
      - "dashboard-frontend-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/jacobbista/dashboard-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            ref="${GITHUB_REF##*/}"
            v="${ref#dashboard-frontend-v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: dashboard/frontend
          file: dashboard/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ steps.ver.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
